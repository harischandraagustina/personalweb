backend:
  name: github
  repo: harischandraagustina/personalweb # Sudah disesuaikan dengan GitHub Anda
  branch: main # Branch utama Anda
  # Mengarah ke URL Worker Anda yang aktif
  base_url: "https://dry-thunder-93ae.agusgp2-3-ag.workers.dev"

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Post"
    folder: "posts"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
