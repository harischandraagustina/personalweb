backend:
  name: github
  repo: USERNAME_GITHUB_ANDA/website-instan-saya # Ganti dengan username dan nama repo Anda
  branch: main # Branch utama Anda

media_folder: "images/uploads" # Tempat menyimpan gambar upload-an CMS
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Post"
    folder: "posts" # CMS akan otomatis membuat folder "posts" untuk tulisan Anda
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
